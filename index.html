        .close-btn {
    display: inline-block;

.btn-close {

.btn-close:hover {

<body>

    <!-- COVER -->

    <div class="cover" id="cover">

    <!-- KONTEN -->

    <div class="container" id="isi">
       

       
    
        <h3>Mohon Do'a & Restu </h3>

        <div class="nama">Refly Febriyanto & Siti Aminah</div>
          <h5>Akan melangsungkan resepsi pernikahan pada:</h5>

        <div class="countdown">

<div class="circle">
<span id="days">0</span>
<p>hari</p>
</div>

<div class="circle">
<span id="hours">0</span>
<p>jam</p>
</div>

<div class="circle">
<span id="minutes">0</span>
<p>menit</p>
</div>

<div class="circle">
<span id="seconds">0</span>
<p>detik</p>
</div>

</div>

      
       
        <h3>Galeri Foto</h3>

        <div class="gallery">
            <img src="foto2.jpg" alt="">
            <img src="foto3.jpg">
            <img src="foto4.jpg">
            <img src="foto5.jpg">
        </div>
        <br>
         <button onclick="maps()">Lihat Lokasi</button>


        <h3>Amplop Digital</h3>

        <p>Bank BCA</p>
        <p id="rek">1234567890</p>
        <p>a.n Dedi Suryadi</p>

        <button onclick="copy()">Copy Rekening</button>

    </div>

    <audio id="musik" loop>
        <source src="musik/03._Christina_Perri_A_Thousand_Years_-_Amor_Vida_2013_(mp3.pm).mp3">
    </audio>

    <script>

        function buka() {

            document.getElementById("cover").style.display = "none";
            document.getElementById("isi").style.display = "block";

            document.getElementById("musik").play();

        }

        /* COUNTDOWN */

        var tanggal = new Date("April 13, 2026 10:00:00").getTime();

        setInterval(function () {

            var sekarang = new Date().getTime();
            var jarak = tanggal - sekarang;

            var hari = Math.floor(jarak / (1000 * 60 * 60 * 24));
            var jam = Math.floor((jarak % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            var menit = Math.floor((jarak % (1000 * 60 * 60)) / (1000 * 60));
            var detik = Math.floor((jarak % (1000 * 60)) / 1000);
            document.getElementById("days").innerHTML = hari;
            document.getElementById("hours").innerHTML = jam;
            document.getElementById("minutes").innerHTML = menit;
            document.getElementById("seconds").innerHTML = detik;

            

        }, 1000);

        /* MAPS */

        function maps() {

            window.open("https://maps.google.com");

        }

        /* COPY REKENING */

        function copy() {

            var rek = document.getElementById("rek").innerText;

            navigator.clipboard.writeText(rek);

            alert("Nomor rekening berhasil di copy");

        }
          <br>
      <button class="btn-close" onclick="Close()">Close</button>
        <br>

    </script>
<div id="popup" style="
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.95);
justify-content:center;
align-items:center;
z-index:999;
">

<button onclick="prevFoto()" style="
position:absolute;
left:20px;
font-size:40px;
background:none;
border:none;
color:white;
cursor:pointer;
">❮</button>

<img id="popupImg" style="max-width:90%;max-height:90%;border-radius:10px;">

<button onclick="nextFoto()" style="
position:absolute;
right:20px;
font-size:40px;
background:none;
border:none;
color:white;
cursor:pointer;
">❯</button>

<button onclick="tutupFoto()" style="
position:absolute;
top:20px;
right:30px;
font-size:35px;
background:none;
border:none;
color:white;
cursor:pointer;
">✕</button>

</div>
<script>

const gambar = document.querySelectorAll(".gallery img");
const popup = document.getElementById("popup");
const popupImg = document.getElementById("popupImg");

let indexFoto = 0;

gambar.forEach((img, index) => {
img.addEventListener("click", function(){
popup.style.display="flex";
popupImg.src=this.src;
indexFoto=index;
});
});

function tutupFoto(){
popup.style.display="none";
}

function nextFoto(){
if(indexFoto < gambar.length - 1){
indexFoto++;
popupImg.src = gambar[indexFoto].src;
}
}

function prevFoto(){
if(indexFoto > 0){
indexFoto--;
popupImg.src = gambar[indexFoto].src;
}
}

</script>
<script>



function Open(){
    document.getElementById("cover").style.display="none";
    document.getElementById("isi").style.display="block";
    document.getElementById("musik").play();
}


function Close(){
    document.getElementById("isi").style.display="none";
    document.getElementById("cover").style.display="flex";
}
</script>
